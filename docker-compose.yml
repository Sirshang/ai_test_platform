services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: aits
      POSTGRES_USER: aits
      POSTGRES_PASSWORD: aits
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aits -d aits"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment: &django_env
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: dev-insecure-change-me
      POSTGRES_DB: aits
      POSTGRES_USER: aits
      POSTGRES_PASSWORD: aits
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      <<: *django_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_started

volumes:
  postgres_data:
